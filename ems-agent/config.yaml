name: "EMS AI"
version: "0.1.0"
slug: "ems_ai"
description: "Multi-Agenten-System fuer Energiemanagement"
startup: services
boot: auto
init: false
hassio_api: true
homeassistant_api: true
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
options:
  devices: []
schema:
  devices:
    - name: str
      type: list(grid|ev_charger|heater|battery|generic)
      entity: str
      max_price: float
      api_key: str?