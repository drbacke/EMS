name: "EMS AI"
version: "0.1.0"
slug: "ems_ai"
description: "Multi-Agenten-System fuer Energiemanagement"
startup: services
boot: auto
init: false
hassio_api: true
homeassistant_api: true
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
options:
  grid_agent:
    provider: simulation
    api_key: ""
  heaters: []
  ev_chargers: []
schema:
  grid_agent:
    provider: list(tibber|simulation)
    api_key: password?
  heaters:
    - name: str
      switch_entity: str
      max_price_cents: float
  ev_chargers:
    - name: str
      switch_entity: str
      max_price_cents: float